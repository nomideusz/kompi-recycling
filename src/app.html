<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f7a4f" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1" />
    <meta name="author" content="kompi.pl" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Default OG (overridden per page) -->
    <meta property="og:site_name" content="recycling.kompi.pl" />
    <meta property="og:locale" content="pl_PL" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://recycling.kompi.pl/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="recycling.kompi.pl — mapa punktów zbiórki elektroodpadów w Polsce" />

    <!-- Default Twitter card (overridden per page) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://recycling.kompi.pl/og-image.svg" />
    <meta name="twitter:image:alt" content="recycling.kompi.pl — mapa punktów zbiórki elektroodpadów w Polsce" />

    <!-- Icons & manifest -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/favicon.svg" color="#1f7a4f" />
    <link rel="apple-touch-icon" href="/icon-maskable.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
